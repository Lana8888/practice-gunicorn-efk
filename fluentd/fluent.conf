<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<filter gunicorn.access>
  @type parser
  key_name log
  reserve_data true
  emit_invalid_record_to_error true
  <parse>
    @type grok
    <grok>
      pattern %{IPORHOST:client} %{USER:ident} %{USER:auth} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:httpversion}" %{NUMBER:response} %{NUMBER:bytes}
    </grok>
  </parse>
</filter>

<match **>
  @type copy
  <store>
    @type stdout
  </store>
  <store>
    @type elasticsearch
    host elasticsearch
    port 9200
    logstash_format true
    logstash_prefix fluentd
    include_tag_key true
    verify_es_version_at_startup false
    default_elasticsearch_version 7
    <buffer>
      flush_interval 1s
    </buffer>
  </store>
</match>
